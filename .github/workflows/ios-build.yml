name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app

      - name: Resolve package dependencies
        run: xcodebuild -resolvePackageDependencies -project IOSMaJiangAR.xcodeproj

      - name: Build app
        shell: bash
        run: |
          set -o pipefail
          xcodebuild build -project IOSMaJiangAR.xcodeproj -scheme IOSMaJiangAR -configuration Release -destination generic/platform=iOS -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO 2>&1 | tee build.log

      - name: Pack IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/IOSMaJiangAR.app Payload/
          /usr/bin/zip -r IOSMaJiangAR-unsigned.ipa Payload

      - name: List App Content
        run: |
          ls -R Payload/IOSMaJiangAR.app

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IOSMaJiangAR-unsigned
          path: |
            IOSMaJiangAR-unsigned.ipa
            build/IOSMaJiangAR.xcarchive

      - name: Upload xcodebuild logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs
          path: |
            build.log
            archive.log
